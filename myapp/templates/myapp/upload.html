{% extends 'myapp/index.html' %}
{% block content %}

<div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute left-[-10%] top-[-10%] h-72 w-72 rounded-full bg-indigo-500/20 spotlight"
      ></div>
      <div
        class="absolute right-[-10%] bottom-[-10%] h-96 w-96 rounded-full bg-fuchsia-500/20 spotlight"
      ></div>
    </div>

    <main class="mx-auto max-w-3xl px-4 sm:px-6 py-10">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h1
            class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900"
          >
            Upload pdf
          </h1>
          <p class="mt-1 text-sm text-slate-600">
            Add your pdf to chat with Ai to get your Answers
          </p>
        </div>
        <span
          class="hidden sm:inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-600"
          >Autosave ready</span
        >
        <a href="{% url 'index' %}"
          class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-100 transition shadow-sm"
        >&#8592; Back</a>
      </div>

      <section
        class="rounded-3xl border border-slate-200 bg-white p-6 sm:p-8 shadow-sm"
      >
        <form method="POST" class="grid grid-cols-1 sm:grid-cols-2 gap-5" enctype="multipart/form-data">
          {% csrf_token %}

              <div class="sm:col-span-2">
                  <label class="block text-sm font-semibold text-slate-700 mb-2">PDF Name</label>
                  <input
                    type="text"
                    name="name"
                    id="id_name"
                    placeholder="Enter a name for your PDF..."
                    class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition"
                  >
              </div>
            <!-- Styled File Input -->
            <div class="mt-4">
            <label class="block text-sm font-semibold text-slate-700 mb-2">PDF File</label>
            <label for="pdf_file"
              class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer bg-slate-50 hover:bg-indigo-50 hover:border-indigo-400 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-indigo-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8 8m4-4l4 4" />
              </svg>
              <p class="text-indigo-600 font-semibold text-sm">Click to upload PDF</p>
              <p class="text-slate-400 text-xs mt-1" id="file-name">No file chosen</p>
            </label>
            <input type="file" name="pdf_file" id="pdf_file" accept=".pdf" class="hidden" />
          </div>




          <!-- Submit -->
          <div class="sm:col-span-2 mt-2">
            <button
              type="submit"
              class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-extrabold text-white hover:bg-slate-800 active:scale-[.99] transition"
            >
              Submit
            </button>
          </div>
        </form>
      </section>

<script>
  document.getElementById('pdf_file').addEventListener('change', function() {
    const name = this.files[0] ? this.files[0].name : 'No file chosen'
    document.getElementById('file-name').innerText = name
  })
</script>

{% endblock %}
